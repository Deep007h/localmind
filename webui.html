<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalMind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.7.0/mermaid.min.js"></script>
    <style>
        :root {
            --bg0: #0a0c10;
            --bg1: #0f1117;
            --bg2: #161b24;
            --bg3: #1e2533;
            --border: #252d3d;
            --border2: #2e3a50;
            --accent: #00e5ff;
            --accent2: #00b4cc;
            --purple: #7c3aed;
            --green: #00ff9d;
            --red: #ff4757;
            --yellow: #ffd32a;
            --text: #e2e8f0;
            --text2: #8899aa;
            --text3: #4a5568;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Syne', sans-serif; background: var(--bg0); color: var(--text); min-height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        
        .sidebar {
            width: 260px; background: var(--bg1); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
        .new-chat-btn {
            width: 100%; padding: 12px; background: var(--accent); color: var(--bg0);
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .new-chat-btn:hover { background: var(--accent2); }
        
        .sidebar-search { padding: 12px; }
        .sidebar-search input {
            width: 100%; padding: 10px 12px; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-size: 14px;
        }
        .sidebar-search input:focus { outline: none; border-color: var(--accent); }
        
        .conversation-list { flex: 1; overflow-y: auto; padding: 8px; }
        .conv-item {
            padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .conv-item:hover { background: var(--bg2); }
        .conv-item.active { background: var(--bg3); border-left: 3px solid var(--accent); }
        .conv-item .title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .conv-item .meta { font-size: 11px; color: var(--text3); }
        .conv-item .pin { color: var(--yellow); }
        
        .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .sidebar-btn {
            padding: 10px; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text2); cursor: pointer; text-align: left;
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-btn:hover { background: var(--bg3); color: var(--text); }
        
        .main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        
        .topbar {
            height: 60px; background: var(--bg1); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; gap: 16px;
            flex-shrink: 0;
        }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; }
        .logo svg { width: 28px; height: 28px; }
        
        .model-selector {
            padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-size: 14px; cursor: pointer;
        }
        .model-selector:focus { outline: none; border-color: var(--accent); }
        
        .mode-chips { display: flex; gap: 8px; }
        .mode-chip {
            padding: 6px 12px; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .mode-chip.active { background: var(--purple); border-color: var(--purple); color: white; }
        .mode-chip:hover { border-color: var(--accent); }
        
        .topbar-actions { margin-left: auto; display: flex; gap: 8px; }
        .topbar-btn {
            padding: 8px; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text2); cursor: pointer;
        }
        .topbar-btn:hover { color: var(--text); }
        
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        
        .message { display: flex; gap: 12px; max-width: 85%; animation: fadeIn 0.1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { flex-direction: row-reverse; align-self: flex-end; }
        .message.ai { align-self: flex-start; }
        
        .message-avatar {
            width: 36px; height: 36px; border-radius: 8px; display: flex;
            align-items: center; justify-content: center; font-weight: 600; font-size: 14px;
            flex-shrink: 0;
        }
        .message.user .message-avatar { background: var(--accent); color: var(--bg0); }
        .message.ai .message-avatar { background: var(--purple); color: white; }
        
        .message-content { flex: 1; min-width: 0; }
        .message-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; color: var(--text2); }
        .message-body { line-height: 1.6; word-wrap: break-word; }
        
        .reasoning-block {
            background: var(--bg2); border: 1px solid var(--purple); border-radius: 8px;
            margin-bottom: 12px; overflow: hidden;
        }
        .reasoning-header {
            padding: 8px 12px; background: rgba(124, 58, 237, 0.2); cursor: pointer;
            display: flex; align-items: center; gap: 8px; font-size: 13px;
        }
        .reasoning-content {
            padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 13px;
            color: var(--text2); max-height: 300px; overflow-y: auto; display: none;
        }
        .reasoning-block.expanded .reasoning-content { display: block; }
        
        .code-block {
            background: var(--bg1); border: 1px solid var(--border); border-radius: 8px;
            margin: 12px 0; overflow: hidden;
        }
        .code-header {
            padding: 8px 12px; background: var(--bg2); display: flex;
            align-items: center; justify-content: space-between; font-size: 12px;
        }
        .code-lang { color: var(--accent); font-family: 'JetBrains Mono', monospace; }
        .code-copy { cursor: pointer; color: var(--text2); }
        .code-copy:hover { color: var(--text); }
        .code-block pre { padding: 12px; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
        
        .message-actions {
            display: flex; gap: 8px; margin-top: 8px; opacity: 0; transition: opacity 0.2s;
        }
        .message:hover .message-actions { opacity: 1; }
        .msg-action-btn {
            padding: 4px 8px; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 4px; font-size: 11px; cursor: pointer; color: var(--text2);
        }
        .msg-action-btn:hover { color: var(--text); }
        
        .streaming-cursor { display: inline-block; width: 10px; height: 18px; background: var(--accent); animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        
        .input-area {
            padding: 16px 20px; background: var(--bg1); border-top: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 12px;
        }
        .input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
        .input-actions { display: flex; gap: 8px; }
        .input-action-btn {
            padding: 10px; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text2); cursor: pointer;
        }
        .input-action-btn:hover { color: var(--text); }
        
        #message-input {
            flex: 1; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit;
            resize: none; max-height: 200px; min-height: 44px;
        }
        #message-input:focus { outline: none; border-color: var(--accent); }
        
        .send-btn {
            padding: 12px 24px; background: var(--accent); border: none;
            border-radius: 8px; color: var(--bg0); font-weight: 600; cursor: pointer;
        }
        .send-btn:hover { background: var(--accent2); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .stop-btn {
            padding: 12px 24px; background: var(--red); border: none;
            border-radius: 8px; color: white; font-weight: 600; cursor: pointer;
        }
        
        .image-preview {
            display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 0;
        }
        .image-preview-item {
            position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden;
        }
        .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .image-preview-item .remove {
            position: absolute; top: 4px; right: 4px; width: 20px; height: 20px;
            background: var(--red); border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
        }
        
        .right-panel {
            width: 280px; background: var(--bg1); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .right-panel.collapsed { display: none; }
        
        .right-tabs {
            display: flex; border-bottom: 1px solid var(--border);
        }
        .right-tab {
            flex: 1; padding: 12px; text-align: center; font-size: 12px;
            cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent;
        }
        .right-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        
        .right-content { flex: 1; overflow-y: auto; padding: 16px; }
        .right-section { display: none; }
        .right-section.active { display: block; }
        
        .settings-group { margin-bottom: 20px; }
        .settings-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
        .settings-input {
            width: 100%; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-size: 14px;
        }
        .settings-select {
            width: 100%; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-size: 14px;
        }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-item { background: var(--bg2); padding: 12px; border-radius: 8px; }
        .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
        .stat-value { font-size: 16px; font-weight: 600; }
        
        .toast-container {
            position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 1000;
        }
        .toast {
            padding: 12px 20px; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 8px; animation: slideIn 0.3s ease-out;
        }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none;
            align-items: center; justify-content: center; z-index: 1001;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg1); border: 1px solid var(--border); border-radius: 12px;
            padding: 24px; max-width: 500px; width: 90%;
        }
        .modal h2 { margin-bottom: 16px; }
        .modal-close { float: right; cursor: pointer; font-size: 20px; }
        
        .command-palette {
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            width: 400px; background: var(--bg1); border: 1px solid var(--border);
            border-radius: 12px; display: none; z-index: 1002; overflow: hidden;
        }
        .command-palette.active { display: block; }
        .cp-input {
            width: 100%; padding: 16px; background: transparent; border: none;
            border-bottom: 1px solid var(--border); color: var(--text); font-size: 16px;
        }
        .cp-input:focus { outline: none; }
        .cp-results { max-height: 300px; overflow-y: auto; }
        .cp-item {
            padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px;
        }
        .cp-item:hover { background: var(--bg2); }
        .cp-item .keys { margin-left: auto; font-size: 11px; color: var(--text3); }
        
        .slider-group { margin-bottom: 16px; }
        .slider-label { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
        .slider-input { width: 100%; }
        
        .branch-menu { position: absolute; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; display: none; z-index: 100; }
        .branch-menu.active { display: block; }
        .branch-menu-item { padding: 8px 16px; cursor: pointer; }
        .branch-menu-item:hover { background: var(--bg3); }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .right-panel { display: none; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
            </div>
            <div class="sidebar-search">
                <input type="text" placeholder="Search conversations..." id="conv-search">
            </div>
            <div class="conversation-list" id="conversation-list"></div>
            <div class="sidebar-footer">
                <button class="sidebar-btn" onclick="showModelManager()">📦 Model Manager</button>
                <button class="sidebar-btn" onclick="showCloudProviders()">☁️ Cloud Models</button>
                <button class="sidebar-btn" onclick="showSystemStats()">💻 System Health</button>
                <button class="sidebar-btn" onclick="showSettings()">⚙️ Settings</button>
                <button class="sidebar-btn" onclick="toggleTheme()">🌓 Theme</button>
            </div>
        </aside>
        
        <main class="main-area">
            <header class="topbar">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    LocalMind
                </div>
                <select class="model-selector" id="model-selector" onchange="changeModel(this.value)"></select>
                <div class="mode-chips">
                    <span class="mode-chip" id="chip-reason" onclick="toggleMode('reason')">🧠 Deep Reason</span>
                    <span class="mode-chip" id="chip-vision" onclick="toggleMode('vision')">👁 Vision</span>
                    <span class="mode-chip" id="chip-fast" onclick="toggleMode('fast')">⚡ Fast</span>
                    <span class="mode-chip" id="chip-nohistory" onclick="toggleMode('nohistory')">🔒 No History</span>
                </div>
                <div class="topbar-actions">
                    <button class="topbar-btn" onclick="exportChat()" title="Export">📥</button>
                    <button class="topbar-btn" onclick="shareChat()" title="Share">📤</button>
                    <button class="topbar-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
                    <button class="topbar-btn" onclick="showCommandPalette()" title="Commands (Ctrl+K)">⌘</button>
                </div>
            </header>
            
            <div class="chat-area" id="chat-area"></div>
            
            <div class="input-area">
                <div class="image-preview" id="image-preview"></div>
                <div class="input-wrapper">
                    <div class="input-actions">
                        <button class="input-action-btn" onclick="document.getElementById('file-input').click()" title="Attach">📎</button>
                        <button class="input-action-btn" onclick="captureScreenshot()" title="Screenshot">🖼</button>
                        <button class="input-action-btn" onclick="startVoiceInput()" title="Voice">🎙</button>
                        <button class="input-action-btn" onclick="showSystemPrompt()" title="System Prompt">⚙</button>
                        <button class="input-action-btn" onclick="showParameters()" title="Parameters">📊</button>
                    </div>
                    <textarea id="message-input" placeholder="Ask anything…" rows="1" onkeydown="handleInputKey(event)"></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
                </div>
                <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
            </div>
        </main>
        
        <aside class="right-panel" id="right-panel">
            <div class="right-tabs">
                <span class="right-tab active" onclick="switchRightTab('reasoning')">Reasoning</span>
                <span class="right-tab" onclick="switchRightTab('artifacts')">Artifacts</span>
                <span class="right-tab" onclick="switchRightTab('files')">Files</span>
                <span class="right-tab" onclick="switchRightTab('settings')">Settings</span>
                <span class="right-tab" onclick="switchRightTab('stats')">Stats</span>
            </div>
            <div class="right-content">
                <div class="right-section active" id="section-reasoning">
                    <div id="reasoning-display"></div>
                </div>
                <div class="right-section" id="section-artifacts">
                    <div id="artifacts-display"></div>
                </div>
                <div class="right-section" id="section-files">
                    <div id="files-display"></div>
                </div>
                <div class="right-section" id="section-settings">
                    <div class="settings-group">
                        <div class="settings-label">Default Model</div>
                        <select class="settings-select" id="default-model"></select>
                    </div>
                    <div class="settings-group">
                        <div class="settings-label">Default Temperature</div>
                        <input type="range" class="slider-input" id="default-temp" min="0" max="2" step="0.1" value="0.7" oninput="updateTempDisplay()">
                        <span id="temp-display">0.7</span>
                    </div>
                    <div class="settings-group">
                        <div class="settings-label">Ollama Host</div>
                        <input type="text" class="settings-input" id="ollama-host" value="http://localhost:11434">
                    </div>
                    <button class="sidebar-btn" onclick="saveSettings()">Save Settings</button>
                </div>
                <div class="right-section" id="section-stats">
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">CPU</div>
                            <div class="stat-value" id="stat-cpu">--</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">RAM</div>
                            <div class="stat-value" id="stat-ram">--</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">GPU VRAM</div>
                            <div class="stat-value" id="stat-gpu">--</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Tokens/sec</div>
                            <div class="stat-value" id="stat-tokens">--</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </div>
    
    <div class="toast-container" id="toast-container"></div>
    
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>
    
    <div class="command-palette" id="command-palette">
        <input type="text" class="cp-input" placeholder="Type a command..." id="cp-input" oninput="filterCommands()">
        <div class="cp-results" id="cp-results"></div>
    </div>

    <script>
        let currentConversation = null;
        let currentModel = 'qwen2.5:7b';
        let availableModels = [];
        let attachedImages = [];
        let isStreaming = false;
        let streamController = null;
        let modes = { reason: false, vision: false, fast: false, nohistory: false };
        let parameters = { temperature: 0.7, top_p: 0.9, top_k: 40, max_tokens: 32768, repeat_penalty: 1.1, seed: null };
        let conversations = [];
        
        const commands = [
            { name: 'New Chat', action: () => newChat(), keys: 'Ctrl+N' },
            { name: 'Switch Model', action: () => showModelSelector(), keys: '' },
            { name: 'Clear Chat', action: () => clearChat(), keys: 'Ctrl+L' },
            { name: 'Export Chat', action: () => exportChat(), keys: 'Ctrl+E' },
            { name: 'Toggle Sidebar', action: () => toggleSidebar(), keys: 'Ctrl+B' },
            { name: 'Regenerate', action: () => regenerateLast(), keys: 'Ctrl+R' },
            { name: 'Stop Stream', action: () => stopStream(), keys: 'Ctrl+.' },
            { name: 'Open Settings', action: () => showSettings(), keys: '' },
            { name: 'Pull Model', action: () => showModelManager(), keys: '' },
        ];
        
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
        
        async function init() {
            await loadAllModels();
            await loadConversations();
            loadSettings();
            startStatsPolling();
            checkOllamaStatus();
        }
        
        async function checkOllamaStatus() {
            try {
                const resp = await fetch('http://localhost:11434/api/tags', { method: 'GET' });
                if (!resp.ok) showToast('Ollama not running', 'error');
            } catch(e) {
                showToast('Waiting for Ollama...', 'error');
            }
        }
        
        async function loadModels() {
            try {
                const resp = await fetch('/api/models');
                availableModels = await resp.json();
                updateModelSelector();
            } catch(e) { console.error(e); }
        }
        
        let allCloudModels = [];
        
        async function loadAllModels() {
            await loadModels();
            try {
                const resp = await fetch('/api/cloud-models');
                allCloudModels = await resp.json();
            } catch(e) { allCloudModels = []; }
            updateModelSelector();
        }
        
        function updateModelSelector() {
            const sel = document.getElementById('model-selector');
            const defSel = document.getElementById('default-model');
            sel.innerHTML = '';
            defSel.innerHTML = '';
            
            const localGroup = document.createElement('optgroup');
            localGroup.label = 'Local (Ollama)';
            availableModels.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.name;
                opt.textContent = m.name + (m.badges ? ' [' + m.badges.join(' ') + ']' : '');
                localGroup.appendChild(opt);
                defSel.appendChild(opt.cloneNode(true));
            });
            sel.appendChild(localGroup);
            
            if (allCloudModels.length > 0) {
                const cloudGroup = document.createElement('optgroup');
                cloudGroup.label = 'Cloud';
                allCloudModels.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = `${m.name} (${m.provider})`;
                    cloudGroup.appendChild(opt);
                    defSel.appendChild(opt.cloneNode(true));
                });
                sel.appendChild(cloudGroup);
            }
            
            if (availableModels.length > 0 && !currentModel) {
                currentModel = availableModels[0].name;
            }
        }
        
        async function loadConversations() {
            try {
                const resp = await fetch('/api/conversations');
                conversations = await resp.json();
                renderConversationList();
            } catch(e) { console.error(e); }
        }
        
        function renderConversationList() {
            const list = document.getElementById('conversation-list');
            list.innerHTML = '';
            conversations.forEach(c => {

        async function streamChat(messages, model, params, onToken, onDone, onError) {
            isStreaming = true;
            streamController = new AbortController();
            window._currentStream = streamController;
            
            const isCloudModel = model.includes(':');
            const ollamaHost = localStorage.getItem('ollamaHost') || 'http://localhost:11434';
            
            try {
                let url, body, headers;
                
                if (isCloudModel) {
                    url = '/api/chat/cloud';
                    headers = { 'Content-Type': 'application/json' };
                    body = JSON.stringify({
                        model: model,
                        messages: messages,
                        stream: true,
                        temperature: params.temperature,
                        max_tokens: params.max_tokens
                    });
                } else {
                    url = `${ollamaHost}/api/chat`;
                    headers = { 'Content-Type': 'application/json' };
                    body = JSON.stringify({
                        model: model,
                        messages: messages,
                        stream: true,
                        options: {
                            temperature: params.temperature,
                            top_p: params.top_p,
                            top_k: params.top_k,
                            num_predict: params.max_tokens,
                            repeat_penalty: params.repeat_penalty,
                            seed: params.seed || undefined
                        }
                    });
                }
                
                const res = await fetch(url, {
                    method: 'POST',
                    headers: headers,
                    signal: streamController.signal,
                    body: body
                });
                
                if (!res.ok) {
                    const err = await res.text();
                    throw new Error(err);
                }
                
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let reasoning = '';
                let inReasoning = false;
                let startTime = Date.now();
                let firstTokenTime = null;
                let tokenCount = 0;
                let totalDuration = 0;
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    
                    for (const line of lines) {
                        if (!line.trim() || line === 'data: [DONE]') continue;
                        try {
                            let json;
                            if (line.startsWith('data: ')) {
                                json = JSON.parse(line.slice(6));
                            } else {
                                json = JSON.parse(line);
                            }
                            
                            let content = '';
                            if (isCloudModel) {
                                if (json.choices && json.choices[0].delta && json.choices[0].delta.content) {
                                    content = json.choices[0].delta.content;
                                } else if (json.choices && json.choices[0].message) {
                                    content = json.choices[0].message.content;
                                }
                            } else {
                                content = json.message?.content || '';
                            }
                            
                            if (content) {
                                if (!firstTokenTime) firstTokenTime = Date.now() - startTime;
                                tokenCount++;
                                
                                if (content.includes('<think>')) { inReasoning = true; }
                                if (inReasoning) {
                                    reasoning += content;
                                    if (content.includes('')) {
                                        inReasoning = false;
                                        onToken({ type: 'reasoning', content: reasoning });
                                        reasoning = '';
                                        const afterThink = content.split('')[1] || '';
                                        if (afterThink) onToken({ type: 'text', content: afterThink });
                                    }
                                    continue;
                                }
                                onToken({ type: 'text', content: content });
                            }
                            
                            if (json.choices && json.choices[0].finish_reason) {
                                totalDuration = Date.now() - startTime;
                                onDone({
                                    totalTokens: tokenCount,
                                    promptTokens: 0,
                                    duration: totalDuration,
                                    firstTokenMs: firstTokenTime,
                                    tokensPerSec: tokenCount / (totalDuration / 1000)
                                });
                            }
                        } catch(e) {}
                    }
                }
            } catch(e) {
                if (e.name !== 'AbortError') {
                    onError(e.message);
                }
            }
        }

                return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => {

                attachedImages.push({ data: b64, mime: file.type });
                const preview = document.getElementById('image-preview');

            e.target.value = '';

        async function captureScreenshot() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const track = stream.getVideoTracks()[0];
                const imageCapture = new ImageCapture(track);
                const bitmap = await imageCapture.captureFrame();
                const canvas = document.createElement('canvas');
                canvas.width = bitmap.width;
                canvas.height = bitmap.height;
                canvas.getContext('2d').drawImage(bitmap, 0, 0);
                const b64 = canvas.toDataURL('image/png').split(',')[1];
                attachedImages.push({ data: b64, mime: 'image/png' });
                const preview = document.getElementById('image-preview');
                const div = document.createElement('div');
                div.className = 'image-preview-item';
                div.innerHTML = `<img src="${canvas.toDataURL()}"><span class="remove" onclick="removeImage(${attachedImages.length - 1}, this.parentElement)">×</span>`;
                preview.appendChild(div);
                track.stop();
            } catch(e) {
                showToast('Screenshot failed', 'error');
            }
        }

            }
            list.innerHTML = cloudProviders.map(p => `
                <div style="padding:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <strong>${p.name}</strong>
                        <span style="color:var(--text3);font-size:12px;">${p.api_key || 'No API key'}</span>
                    </div>
                    <div>
                        <button onclick="toggleCloudProvider('${p.id}', ${p.enabled})" style="padding:4px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;cursor:pointer;color:${p.enabled ? 'var(--green)' : 'var(--text3)'}">${p.enabled ? 'Enabled' : 'Disabled'}</button>
                        <button onclick="deleteCloudProvider('${p.id}')" style="padding:4px 8px;background:var(--red);border:none;border-radius:4px;cursor:pointer;color:white;margin-left:8px;">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function renderCloudModels() {
            const list = document.getElementById('cloud-models-list');
            if (cloudModels.length === 0) {
                list.innerHTML = '<p style="color:var(--text3);">No cloud models available. Add a provider first.</p>';
                return;
            }
            list.innerHTML = cloudModels.map(m => `
                <div style="padding:8px 12px;background:var(--bg2);border-radius:6px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <span style="color:var(--accent);">${m.name}</span>
                        <span style="color:var(--text3);font-size:12px;"> - ${m.provider}</span>
                        ${m.supports_vision ? '<span style="background:var(--purple);color:white;padding:2px 6px;border-radius:4px;font-size:10px;margin-left:8px;">VISION</span>' : ''}
                    </div>
                </div>
            `).join('');
        }
        
        async function showAddCloudProvider() {
            let availableProviders = [];
            try {
                const resp = await fetch('/api/cloud-providers/available');
                availableProviders = await resp.json();
            } catch(e) { return; }
            
            const options = Object.entries(availableProviders).map(([key, val]) => 
                `<option value="${key}">${val.name}</option>`
            ).join('');
            
            showModal(`
                <h2>Add Cloud Provider</h2>
                <div class="settings-group">
                    <div class="settings-label">Provider</div>
                    <select class="settings-select" id="new-provider-type" onchange="updateProviderFields()">
                        <option value="">Select a provider...</option>
                        ${options}
                    </select>
                </div>
                <div id="provider-fields"></div>
                <button onclick="saveCloudProvider()" style="margin-top:16px;padding:10px 20px;background:var(--accent);border:none;border-radius:6px;cursor:pointer;">Save Provider</button>
            `);
        }
        
        function updateProviderFields() {
            const type = document.getElementById('new-provider-type').value;
            const fields = document.getElementById('provider-fields');
            if (!type) {
                fields.innerHTML = '';
                return;
            }
            fields.innerHTML = `
                <div class="settings-group">
                    <div class="settings-label">API Key</div>
                    <input type="password" class="settings-input" id="new-api-key" placeholder="Enter your API key">
                </div>
                <div class="settings-group">
                    <div class="settings-label">Custom Base URL (optional)</div>
                    <input type="text" class="settings-input" id="new-base-url" placeholder="Leave empty for default">
                </div>
            `;
        }
        
        async function saveCloudProvider() {
            const type = document.getElementById('new-provider-type').value;
            const apiKey = document.getElementById('new-api-key')?.value;
            const baseUrl = document.getElementById('new-base-url')?.value;
            
            if (!type || !apiKey) {
                showToast('Please select provider and enter API key', 'error');
                return;
            }
            
            try {
                const resp = await fetch('/api/cloud-providers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        provider_type: type,
                        api_key: apiKey,
                        base_url: baseUrl
                    })
                });
                if (resp.ok) {
                    showToast('Provider added!', 'success');
                    closeModal();
                    await loadCloudProviders();
                    await loadCloudModels();
                } else {
                    showToast('Failed to add provider', 'error');
                }
            } catch(e) {
                showToast('Error: ' + e.message, 'error');
            }
        }
        
        async function toggleCloudProvider(id, enabled) {
            try {
                await fetch(`/api/cloud-providers/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled: !enabled })
                });
                await loadCloudProviders();
                await loadCloudModels();
            } catch(e) {
                showToast('Error updating provider', 'error');
            }
        }
        
        async function deleteCloudProvider(id) {
            if (!confirm('Delete this provider?')) return;
            try {
                await fetch(`/api/cloud-providers/${id}`, { method: 'DELETE' });
                await loadCloudProviders();
                await loadCloudModels();
                showToast('Provider deleted', 'success');
            } catch(e) {
                showToast('Error deleting provider', 'error');
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                showCommandPalette();
            }
            if (e.key === 'Escape') {
                closeCommandPalette();
                closeModal();
            }
        });
        
        init();
    </script>
</body>
</html>
